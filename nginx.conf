server {
  listen 80;
  server_name _;
  server_tokens off;
  charset utf-8;
  client_max_body_size 1m;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), browsing-topics=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header X-XSS-Protection "0" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'" always;

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    limit_except GET HEAD {
      deny all;
    }
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }

  location ~* \.(?:css|js|woff2?|ttf|svg|jpg|jpeg|png|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    limit_except GET HEAD {
      deny all;
    }
  }
}
